# Set the control character to Ctrl+Spacebar (instead of Ctrl+B)
set -g prefix C-space
unbind-key C-b
bind-key C-space send-prefix

# Set new panes to open in current directory
bind c new-window -c "#{pane_current_path}"
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# Set vi-style keys for copy-mode
setw -g mode-keys vi

# Add true vi-style selection and yank
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Set pane navigation to C-h/j/k/l (no prefix)
# (Fixed the bad spaces before the comments)
bind -n C-h select-pane -L # Move to the pane on the left
bind -n C-j select-pane -D # Move to the pane below
bind -n C-k select-pane -U # Move to the pane above
bind -n C-l select-pane -R # Move to the pane on the right

# stop swallowing escape key
set -sg escape-time 0
